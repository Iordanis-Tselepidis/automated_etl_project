version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: etl_user
      POSTGRES_PASSWORD: etl_pass
      POSTGRES_DB: weather_db
    ports:
      - "5432:5432"
    volumes:
      - weather_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etl_user"]
      interval: 5s
      timeout: 5s
      retries: 10

  etl:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: weather_db
      DB_USER: etl_user
      DB_PASSWORD: etl_pass
    volumes:
      - .:/app

volumes:
  weather_db_data:
